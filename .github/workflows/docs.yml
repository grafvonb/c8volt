name: Docs CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate docs content
        working-directory: .
        run: make docs

      - name: Build site for root-host deployment
        working-directory: .
        run: make docs-site-build-root
