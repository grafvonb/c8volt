# This is the shape of the recording-only config generated by
# demos/vhs/scripts/prepare-recording-env.sh.
#
# Do not put real credentials in this file. The render script writes the real
# config to /tmp/c8volt-vhs/bin/config.yaml from C8VOLT_VHS_* environment
# variables.

active_profile: c89

auth:
  mode: oauth2
  oauth2:
    token_url: "https://login.example.com/oauth/token"
    client_id: "c8volt"
    client_secret: "set via C8VOLT_VHS_OAUTH_CLIENT_SECRET"

profiles:
  c89:
    app:
      camunda_version: "8.9"
    apis:
      camunda_api:
        base_url: "https://camunda.example.com"

log:
  format: plain-time
  level: info
